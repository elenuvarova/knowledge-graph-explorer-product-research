<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Graph Explorer</title>
    <meta
      name="description"
      content="Type any domain and get a structured, interactive knowledge graph of its concepts, research, organisations and product-opportunity areas — built from open data in about thirty seconds."
    />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme colour follows the active scheme -->
    <meta name="theme-color" content="#f7f8fa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)" />

    <!-- Social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Knowledge Graph Explorer" />
    <meta
      property="og:description"
      content="From a typed topic to a navigable map of a domain — and where the product openings are — in one tab."
    />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Knowledge Graph Explorer" />
    <meta
      name="twitter:description"
      content="From a typed topic to a navigable map of a domain — and where the product openings are — in one tab."
    />
    <script>
      // Set the theme before first paint to avoid a flash of the wrong colours.
      (function () {
        try {
          var k = 'kge-theme', t = localStorage.getItem(k);
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
